<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mini Navegador Proxy</title>
  <style>
    body { font-family: sans-serif; margin: 40px; }
    #urlBar { width: 350px; padding: 5px; }
    iframe { border: 1px solid #ccc; margin-top: 18px; }
  </style>
</head>
<body>
  <h2>Navegador Proxy</h2>
  <input id="urlBar" type="text" placeholder="Introduce una URL...">
  <button onclick="loadURL()">Ir</button>
  <iframe id="subBrowser" width="90%" height="600"></iframe>
  <script>
    function loadURL() {
      let url = document.getElementById('urlBar').value.trim();
      if (!url.startsWith('http')) url = 'https://' + url;
      document.getElementById('subBrowser').src = '/api/proxy?url=' + encodeURIComponent(url);
    }
  </script>
</body>
</html>
