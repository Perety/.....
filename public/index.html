<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mini Navegador Proxy</title>
  <style>
    body { font-family: sans-serif; margin: 40px; }
    #browserBar { display: flex; align-items: center; gap: 4px; margin-bottom: 0.7em; }
    #urlBar { flex: 1; padding: 5px; }
    button { padding: 5px 12px; }
    iframe { border: 1px solid #ccc; margin-top: 18px; }
  </style>
</head>
<body>
  <h2>Navegador Proxy</h2>
  <div id="browserBar">
    <button id="backBtn" onclick="goBack()" title="Atrás">&lt;</button>
    <button id="forwardBtn" onclick="goForward()" title="Adelante">&gt;</button>
    <button id="reloadBtn" onclick="reload()" title="Recargar">&#8635;</button>
    <input id="urlBar" type="text" placeholder="Introduce una URL y pulsa 'Ir'">
    <button onclick="loadURL()">Ir</button>
  </div>
  <iframe id="subBrowser" width="100%" height="600"></iframe>
  <script>
    // Historial de URLs (solo en memoria)
    let historyStack = [];
    let historyPos = -1;

    function updateNavButtons() {
      backBtn.disabled = historyPos <= 0;
      forwardBtn.disabled = historyPos >= historyStack.length - 1;
      reloadBtn.disabled = historyPos === -1;
    }

    function loadURL(navUrl) {
      let url;
      if (typeof navUrl === "string") url = navUrl;
      else url = document.getElementById('urlBar').value.trim();
      if (!url) return;
      if (!url.startsWith('http')) url = 'https://' + url;

      // Si navegamos desde mitad del historial, corta ramas "adelante"
      if (historyPos < historyStack.length - 1) {
        historyStack = historyStack.slice(0, historyPos + 1);
      }
      historyStack.push(url);
      historyPos++;
      updateIframeAndBar();
    }

    function updateIframeAndBar() {
      const url = historyStack[historyPos];
      document.getElementById('urlBar').value = url;
      document.getElementById('subBrowser').src = '/api/proxy?url=' + encodeURIComponent(url);
      updateNavButtons();
    }

    function goBack() {
      if (historyPos > 0) {
        historyPos--;
        updateIframeAndBar();
      }
    }

    function goForward() {
      if (historyPos < historyStack.length - 1) {
        historyPos++;
        updateIframeAndBar();
      }
    }

    function reload() {
      if (historyPos >= 0) {
        updateIframeAndBar();
      }
    }

    // Load on pressing Enter in bar
    document.getElementById('urlBar').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') loadURL();
    });

    // Inicializa botones
    const backBtn = document.getElementById('backBtn');
    const forwardBtn = document.getElementById('forwardBtn');
    const reloadBtn = document.getElementById('reloadBtn');
    updateNavButtons();
  </script>
</body>
</html>
